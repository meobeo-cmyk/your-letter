<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Letter</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#f5f2ec;
  --bg2:#edeae2;
  --surface:rgba(255,255,255,0.92);
  --surface2:rgba(255,255,255,0.6);
  --border:rgba(0,0,0,0.09);
  --border2:rgba(0,0,0,0.05);
  --text:#1c1a17;
  --text2:#6b6760;
  --text3:#a39f99;
  --accent:#1c1a17;
  --accent2:#8b7355;
  --green:#3d8c5a;
  --red:#c0392b;
  --taskbar:rgba(245,242,236,0.72);
  --shadow:0 2px 20px rgba(0,0,0,0.09),0 1px 4px rgba(0,0,0,0.06);
  --shadow-lg:0 8px 48px rgba(0,0,0,0.14),0 2px 8px rgba(0,0,0,0.08);
}
body.dark{
  --bg:#141210;
  --bg2:#1c1a17;
  --surface:rgba(26,24,20,0.95);
  --surface2:rgba(30,28,24,0.7);
  --border:rgba(255,255,255,0.08);
  --border2:rgba(255,255,255,0.04);
  --text:#f0ece4;
  --text2:#8a8680;
  --text3:#4a4844;
  --accent:#f0ece4;
  --accent2:#a8956e;
  --taskbar:rgba(14,12,10,0.75);
  --shadow:0 2px 20px rgba(0,0,0,0.4),0 1px 4px rgba(0,0,0,0.3);
  --shadow-lg:0 8px 48px rgba(0,0,0,0.5),0 2px 8px rgba(0,0,0,0.3);
}

body{
  font-family:'Syne',sans-serif;
  background:var(--bg);
  color:var(--text);
  height:100vh;
  overflow:hidden;
  transition:background .4s,color .4s;
  user-select:none;
}

/* ── GRAIN OVERLAY ── */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;
  z-index:99998;
  opacity:0.6;
}

/* ══════════════════════════════
   AUTH SCREENS
══════════════════════════════ */
#auth-screen{
  position:fixed;inset:0;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  z-index:9999;
  transition:opacity .5s;
}
#auth-screen.hide{opacity:0;pointer-events:none}

.auth-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:24px;
  padding:44px 40px 36px;
  width:360px;
  box-shadow:var(--shadow-lg);
  position:relative;
}

.auth-logo{
  font-family:'Cormorant Garamond',serif;
  font-size:28px;
  font-weight:300;
  letter-spacing:0.02em;
  color:var(--text);
  margin-bottom:6px;
}
.auth-logo span{font-style:italic;color:var(--accent2)}
.auth-sub{font-size:11px;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:32px}

.auth-tabs{
  display:flex;gap:0;
  border:1px solid var(--border);
  border-radius:10px;
  overflow:hidden;
  margin-bottom:26px;
}
.auth-tab{
  flex:1;padding:9px;font-size:11px;font-weight:600;
  font-family:'Syne',sans-serif;letter-spacing:0.05em;text-transform:uppercase;
  border:none;cursor:pointer;background:transparent;color:var(--text3);
  transition:background .2s,color .2s;
}
.auth-tab.active{background:var(--accent);color:var(--bg)}

.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.field label{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text2)}
.field input{
  background:transparent;
  border:1px solid var(--border);
  border-radius:10px;
  padding:11px 14px;
  font-size:13px;
  font-family:'Syne',sans-serif;
  color:var(--text);
  outline:none;
  transition:border-color .2s;
}
.field input:focus{border-color:var(--accent2)}
.field input::placeholder{color:var(--text3);font-style:italic}
.field .hint{font-size:10px;color:var(--text3);line-height:1.5}

.auth-error{
  background:rgba(192,57,43,0.1);
  border:1px solid rgba(192,57,43,0.25);
  border-radius:8px;
  padding:9px 12px;
  font-size:11px;
  color:var(--red);
  margin-bottom:14px;
  display:none;
}
.auth-error.show{display:block}

.btn-auth{
  width:100%;
  background:var(--accent);
  color:var(--bg);
  border:none;
  border-radius:12px;
  padding:13px;
  font-size:12px;
  font-weight:700;
  font-family:'Syne',sans-serif;
  letter-spacing:0.08em;
  text-transform:uppercase;
  cursor:pointer;
  transition:opacity .2s,transform .1s;
  margin-top:6px;
}
.btn-auth:hover{opacity:.85}
.btn-auth:active{transform:scale(.98)}

/* ══════════════════════════════
   CANVAS
══════════════════════════════ */
#canvas{
  position:fixed;
  inset:0;
  bottom:62px;
}

/* ══════════════════════════════
   LETTER CARD
══════════════════════════════ */
.letter{
  position:absolute;
  width:148px;height:148px;
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
  box-shadow:var(--shadow);
  transition:box-shadow .2s,transform .15s;
  z-index:10;
  will-change:transform;
  border:1.5px solid var(--border2);
}
.letter:hover{
  box-shadow:var(--shadow-lg);
  transform:scale(1.05);
  z-index:50;
}
.letter.dragging{
  box-shadow:0 20px 64px rgba(0,0,0,.22);
  transform:scale(1.07) rotate(1deg);
  z-index:999;
  cursor:grabbing;
}

.letter img{
  width:100%;height:100%;
  object-fit:cover;
  display:block;
  pointer-events:none;
}
.letter-no-img{
  width:100%;height:100%;
  background:linear-gradient(135deg,var(--bg2) 0%,var(--bg) 100%);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;
  gap:8px;
  color:var(--text3);
  font-size:10px;
  letter-spacing:0.06em;
  text-transform:uppercase;
}
.letter-no-img svg{opacity:.35}

/* overlay on letter card */
.letter-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.55) 0%,transparent 55%);
  pointer-events:none;
}
.letter-meta{
  position:absolute;
  bottom:0;left:0;right:0;
  padding:8px 8px 8px;
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  pointer-events:none;
}
.letter-from{
  font-size:9px;font-weight:600;
  color:rgba(255,255,255,.85);
  letter-spacing:0.05em;
  text-transform:uppercase;
  text-shadow:0 1px 4px rgba(0,0,0,.4);
  line-height:1.3;
}
.letter-from span{display:block;font-weight:400;color:rgba(255,255,255,.55);font-size:8px}
.letter-replied{
  width:18px;height:18px;
  background:rgba(61,140,90,.9);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.letter-replied svg{width:9px;height:9px}

/* ══════════════════════════════
   LETTER MODAL (view)
══════════════════════════════ */
#modal-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.38);
  backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  z-index:8000;
  opacity:0;pointer-events:none;
  transition:opacity .25s;
}
#modal-overlay.open{opacity:1;pointer-events:all}

#modal{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:24px;
  width:380px;
  max-height:88vh;
  overflow-y:auto;
  box-shadow:var(--shadow-lg);
  transform:scale(.93) translateY(10px);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1),background .4s;
  position:relative;
}
#modal-overlay.open #modal{transform:scale(1) translateY(0)}

.modal-photo{
  width:100%;
  height:200px;
  object-fit:cover;
  display:block;
  border-radius:22px 22px 0 0;
}
.modal-photo-placeholder{
  width:100%;height:160px;
  background:linear-gradient(135deg,var(--bg2),var(--bg));
  display:flex;align-items:center;justify-content:center;
  border-radius:22px 22px 0 0;
  color:var(--text3);
  font-size:11px;
  letter-spacing:0.06em;
  text-transform:uppercase;
  flex-direction:column;
  gap:8px;
}
.modal-photo-placeholder svg{opacity:.3}

.modal-body{padding:24px 26px 26px}

.modal-header{
  display:flex;align-items:flex-start;
  justify-content:space-between;
  margin-bottom:18px;
}
.modal-from{
  display:flex;flex-direction:column;gap:2px;
}
.modal-from .label{font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);font-weight:600}
.modal-from .name{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;color:var(--text);line-height:1.2}
.modal-from .to-tag{
  font-size:10px;color:var(--accent2);font-weight:600;
  background:rgba(139,115,85,.1);
  padding:3px 8px;
  border-radius:20px;
  display:inline-block;
  margin-top:3px;
  letter-spacing:0.03em;
}

.modal-close{
  background:transparent;
  border:1px solid var(--border);
  width:32px;height:32px;
  border-radius:50%;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--text2);
  flex-shrink:0;
  transition:background .15s;
  margin-left:8px;
}
.modal-close:hover{background:rgba(128,128,128,.1)}

/* divider */
.modal-divider{
  width:40px;height:1.5px;
  background:var(--text3);
  opacity:.3;
  margin:16px 0;
  border-radius:2px;
}

/* message rows */
.msg-row{margin-bottom:16px}
.msg-label{font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:5px}
.msg-text{
  font-family:'Cormorant Garamond',serif;
  font-size:19px;
  line-height:1.5;
  color:var(--text);
  font-weight:300;
}
.msg-text.reply{color:var(--text2);font-size:16px;font-style:italic}
.msg-empty{font-size:12px;color:var(--text3);font-style:italic}

/* reply input area */
.reply-box{
  margin-top:18px;
  border-top:1px solid var(--border);
  padding-top:18px;
}
.reply-box textarea{
  width:100%;
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px 14px;
  font-size:14px;
  font-family:'Cormorant Garamond',serif;
  color:var(--text);
  resize:none;
  outline:none;
  transition:border-color .2s;
  line-height:1.6;
}
.reply-box textarea:focus{border-color:var(--accent2)}
.reply-box textarea::placeholder{color:var(--text3);font-style:italic}

.reply-actions{display:flex;gap:8px;margin-top:10px}
.btn-send-reply{
  flex:1;
  background:var(--accent);
  color:var(--bg);
  border:none;
  border-radius:10px;
  padding:11px;
  font-size:11px;
  font-weight:700;
  font-family:'Syne',sans-serif;
  letter-spacing:0.07em;
  text-transform:uppercase;
  cursor:pointer;
  transition:opacity .15s;
}
.btn-send-reply:hover{opacity:.85}

/* ══════════════════════════════
   CREATE LETTER MODAL
══════════════════════════════ */
#create-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.4);
  backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:center;
  z-index:8100;
  opacity:0;pointer-events:none;
  transition:opacity .25s;
}
#create-overlay.open{opacity:1;pointer-events:all}

#create-modal{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:24px;
  width:340px;
  padding:30px 26px 24px;
  box-shadow:var(--shadow-lg);
  transform:scale(.93) translateY(12px);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1),background .4s;
  max-height:90vh;
  overflow-y:auto;
}
#create-overlay.open #create-modal{transform:scale(1) translateY(0)}

#create-modal h2{
  font-family:'Cormorant Garamond',serif;
  font-size:24px;
  font-weight:400;
  margin-bottom:20px;
  color:var(--text);
}

.upload-zone{
  border:1.5px dashed var(--border);
  border-radius:12px;
  overflow:hidden;
  margin-bottom:14px;
  position:relative;
  cursor:pointer;
  transition:border-color .2s;
  height:100px;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;
  gap:6px;
  color:var(--text3);
  font-size:11px;
  letter-spacing:0.05em;
  text-transform:uppercase;
}
.upload-zone:hover{border-color:var(--accent2)}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-zone svg{opacity:.4}
#create-preview{
  width:100%;height:100%;
  object-fit:cover;
  display:none;
  position:absolute;inset:0;
  border-radius:11px;
}

.at-field{
  position:relative;
  margin-bottom:14px;
}
.at-field label{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text2);display:block;margin-bottom:5px}
.at-field .at-prefix{
  position:absolute;
  left:13px;bottom:11px;
  font-size:14px;color:var(--accent2);font-weight:600;
  pointer-events:none;
}
.at-field input{
  width:100%;
  background:transparent;
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px 12px 10px 28px;
  font-size:13px;
  font-family:'Syne',sans-serif;
  color:var(--text);
  outline:none;
  transition:border-color .2s;
}
.at-field input:focus{border-color:var(--accent2)}
.at-field input::placeholder{color:var(--text3)}
#tag-hint{font-size:10px;margin-top:4px;height:14px}
#tag-hint.ok{color:var(--green)}
#tag-hint.err{color:var(--red)}

.create-btns{display:flex;gap:8px;margin-top:18px}
.btn-drop{
  flex:1;
  background:var(--accent);
  color:var(--bg);
  border:none;
  border-radius:12px;
  padding:12px;
  font-size:11px;
  font-weight:700;
  font-family:'Syne',sans-serif;
  letter-spacing:0.08em;
  text-transform:uppercase;
  cursor:pointer;
  transition:opacity .15s,transform .1s;
}
.btn-drop:hover{opacity:.85}
.btn-drop:active{transform:scale(.97)}
.btn-cancel-c{
  background:transparent;
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px 16px;
  font-size:11px;
  font-weight:600;
  font-family:'Syne',sans-serif;
  color:var(--text2);
  cursor:pointer;
  letter-spacing:0.05em;
  text-transform:uppercase;
  transition:background .15s;
}
.btn-cancel-c:hover{background:rgba(128,128,128,.08)}

/* ══════════════════════════════
   NOTIFICATIONS PANEL
══════════════════════════════ */
#notif-panel{
  position:fixed;
  top:0;right:0;
  bottom:62px;
  width:300px;
  background:var(--surface);
  border-left:1px solid var(--border);
  backdrop-filter:blur(20px);
  z-index:7500;
  transform:translateX(100%);
  transition:transform .35s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
}
#notif-panel.open{transform:translateX(0)}

.notif-header{
  padding:20px 18px 14px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.notif-header h3{
  font-family:'Cormorant Garamond',serif;
  font-size:20px;font-weight:400;
  color:var(--text);
}
.notif-close{
  background:transparent;border:none;
  width:28px;height:28px;
  border-radius:50%;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--text2);
  transition:background .15s;
}
.notif-close:hover{background:rgba(128,128,128,.1)}

.notif-list{flex:1;overflow-y:auto;padding:12px}

.notif-item{
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
  margin-bottom:8px;
  cursor:pointer;
  transition:background .15s;
  background:var(--surface2);
}
.notif-item:hover{background:rgba(139,115,85,.06)}
.notif-item.unread{border-color:var(--accent2);background:rgba(139,115,85,.07)}
.notif-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:3px;letter-spacing:0.02em}
.notif-preview{font-size:11px;color:var(--text2);line-height:1.5;
  font-family:'Cormorant Garamond',serif;font-style:italic}
.notif-time{font-size:9px;color:var(--text3);letter-spacing:0.04em;margin-top:5px;text-transform:uppercase}
.notif-dot{
  display:inline-block;width:6px;height:6px;
  background:var(--accent2);border-radius:50%;
  margin-right:5px;vertical-align:middle;
}
.notif-empty{
  text-align:center;padding:40px 20px;
  color:var(--text3);font-size:12px;line-height:1.8;
}
.notif-empty svg{display:block;margin:0 auto 10px;opacity:.2}

/* ══════════════════════════════
   TASKBAR
══════════════════════════════ */
#taskbar{
  position:fixed;bottom:0;left:0;right:0;
  height:62px;
  background:var(--taskbar);
  backdrop-filter:blur(24px) saturate(1.5);
  -webkit-backdrop-filter:blur(24px) saturate(1.5);
  border-top:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 16px;
  gap:10px;
  z-index:7000;
}

.tbtn{
  display:flex;align-items:center;gap:6px;
  background:transparent;
  border:1px solid var(--border);
  border-radius:10px;
  padding:7px 13px;
  font-size:10px;font-weight:700;
  font-family:'Syne',sans-serif;
  letter-spacing:0.07em;text-transform:uppercase;
  color:var(--text);
  cursor:pointer;
  white-space:nowrap;
  transition:background .15s,transform .1s;
}
.tbtn:hover{background:rgba(128,128,128,.1)}
.tbtn:active{transform:scale(.96)}
.tbtn.primary{background:var(--accent);color:var(--bg);border-color:transparent}
.tbtn.primary:hover{opacity:.85;background:var(--accent)}

.tb-divider{width:1px;height:28px;background:var(--border);flex-shrink:0}

.tb-user{
  display:flex;align-items:center;gap:7px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:10px;
  padding:6px 12px;
  font-size:11px;font-weight:600;
  color:var(--text);
  letter-spacing:0.03em;
  cursor:default;
}
.tb-user .online-dot{
  width:7px;height:7px;border-radius:50%;
  background:#3d8c5a;
  box-shadow:0 0 5px #3d8c5a;
  flex-shrink:0;
}

#tb-count{
  font-size:10px;color:var(--text3);
  background:rgba(128,128,128,.08);
  padding:4px 10px;border-radius:20px;
  font-family:'Syne',sans-serif;
  letter-spacing:0.04em;
  white-space:nowrap;
}

#tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}

.icon-btn{
  width:36px;height:36px;
  border-radius:10px;
  border:1px solid var(--border);
  background:transparent;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--text2);
  transition:background .15s;
  position:relative;
  flex-shrink:0;
}
.icon-btn:hover{background:rgba(128,128,128,.1)}

.notif-badge{
  position:absolute;
  top:-3px;right:-3px;
  width:14px;height:14px;
  background:var(--accent2);
  border-radius:50%;
  font-size:8px;
  font-weight:700;
  font-family:'Syne',sans-serif;
  color:#fff;
  display:flex;align-items:center;justify-content:center;
  display:none;
}
.notif-badge.show{display:flex}

/* ══════════════════════════════
   EMPTY HINT
══════════════════════════════ */
#empty-hint{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-55%);
  text-align:center;
  pointer-events:none;
  z-index:1;
  opacity:.3;
  transition:opacity .4s;
}
#empty-hint.gone{opacity:0}
#empty-hint h2{
  font-family:'Cormorant Garamond',serif;
  font-size:36px;font-weight:300;
  color:var(--text);margin-bottom:8px;
}
#empty-hint p{font-size:12px;color:var(--text2);line-height:1.8;letter-spacing:0.04em}

   DELETE confirm
══════════════════════════════ */
#del-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.45);

<body>

<div id="auth-screen">
  <div class="auth-card">

<!-- ══ LETTER VIEW MODAL ══ -->
<div id="modal-overlay" onclick="handleModalBg(event)">

<script>
// ══════════════════════════════════════════════════════
//  STORAGE HELPERS
// ══════════════════════════════════════════════════════
const DB = {
  getUsers(){ return JSON.parse(localStorage.getItem('yl_users')||'{}') },
  saveUsers(u){ localStorage.setItem('yl_users', JSON.stringify(u)) },
  getLetters(){ return JSON.parse(localStorage.getItem('yl_letters')||'[]') },
  saveLetters(l){ localStorage.setItem('yl_letters', JSON.stringify(l)) },
  getSession(){ return localStorage.getItem('yl_session') },
  saveSession(u){ localStorage.setItem('yl_session', u) },
  clearSession(){ localStorage.removeItem('yl_session') },
  getNotifs(user){ return JSON.parse(localStorage.getItem('yl_notifs_'+user)||'[]') },
  saveNotifs(user,n){ localStorage.setItem('yl_notifs_'+user, JSON.stringify(n)) },
  getTheme(){ return localStorage.getItem('yl_theme')||'light' },
  saveTheme(t){ localStorage.setItem('yl_theme',t) },
};

// ══════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════
let currentUser = null;
let letters = [];
let dragState = null;
let selectedLetter = null;
let selectedImgData = null;
let isDark = DB.getTheme() === 'dark';
let animId = null;
let tagValid = false;

// ══════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════
(function init(){
  if(isDark) document.body.classList.add('dark');
  updateThemeIcon();

  const sess = DB.getSession();
  const users = DB.getUsers();
  if(sess && users[sess]){
    currentUser = sess;
    enterBoard();
  }
})();

// ══════════════════════════════════════════════════════
//  AUTH
// ══════════════════════════════════════════════════════
function switchTab(tab){
  document.getElementById('tab-login').classList.toggle('active', tab==='login');
  document.getElementById('tab-reg').classList.toggle('active', tab==='register');
  document.getElementById('form-login').style.display = tab==='login' ? '' : 'none';
  document.getElementById('form-reg').style.display = tab==='register' ? '' : 'none';
  hideAuthErr();
}

function showAuthErr(msg){
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.classList.add('show');
}
function hideAuthErr(){ document.getElementById('auth-error').classList.remove('show'); }

function validatePassword(p){
  if(p.length < 8) return 'Password must be at least 8 characters.';
  if(!/[A-Z]/.test(p)) return 'Password must contain at least 1 uppercase letter.';
  if(!/[0-9]/.test(p)) return 'Password must contain at least 1 number.';
  return null;
}

function hashPass(p){
  // simple hash (not cryptographic, but good enough for local storage demo)
  let h = 0;
  for(let i=0;i<p.length;i++){ h=(Math.imul(31,h)+p.charCodeAt(i))|0; }
  return h.toString(36);
}

function doRegister(){
  hideAuthErr();
  const u = document.getElementById('re-user').value.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');
  const p = document.getElementById('re-pass').value;
  const p2 = document.getElementById('re-pass2').value;
  if(!u){ showAuthErr('Username cannot be empty.'); return; }
  if(u.length < 2){ showAuthErr('Username must be at least 2 characters.'); return; }
  const perr = validatePassword(p);
  if(perr){ showAuthErr(perr); return; }
  if(p !== p2){ showAuthErr('Passwords do not match.'); return; }
  const users = DB.getUsers();
  if(users[u]){ showAuthErr('Username "@'+u+'" is already taken.'); return; }
  users[u] = { username: u, password: hashPass(p), createdAt: Date.now() };
  DB.saveUsers(users);
  currentUser = u;
  DB.saveSession(u);
  enterBoard();
}

function doLogin(){
  hideAuthErr();
  const u = document.getElementById('li-user').value.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');
  const p = document.getElementById('li-pass').value;
  const users = DB.getUsers();
  if(!users[u]){ showAuthErr('No account with username "@'+u+'".'); return; }
  if(users[u].password !== hashPass(p)){ showAuthErr('Wrong password.'); return; }
  currentUser = u;
  DB.saveSession(u);
  enterBoard();
}

function doLogout(){
  DB.clearSession();
  currentUser = null;
  cancelAnimationFrame(animId);
  document.getElementById('canvas').innerHTML = '';
  letters = [];
  document.getElementById('auth-screen').classList.remove('hide');
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('auth-screen').style.opacity = '1';
  document.getElementById('auth-screen').style.pointerEvents = '';
  document.getElementById('li-user').value = '';
  document.getElementById('li-pass').value = '';
  hideAuthErr();
  switchTab('login');
}

function enterBoard(){
  const screen = document.getElementById('auth-screen');
  screen.classList.add('hide');
  setTimeout(()=>{ screen.style.display='none'; }, 500);
  document.getElementById('tb-username').textContent = '@'+currentUser;
  letters = DB.getLetters();
  renderAllLetters();
  updateCount();
  updateNotifBadge();
  startAnimation();
}

// ══════════════════════════════════════════════════════
//  LETTERS — RENDER
// ══════════════════════════════════════════════════════
function renderAllLetters(){
  const canvas = document.getElementById('canvas');
  canvas.innerHTML = '';
  letters.forEach(l => renderLetter(l));
  if(letters.length > 0) document.getElementById('empty-hint').classList.add('gone');
}

function renderLetter(l){
  const el = document.createElement('div');
  el.className = 'letter';
  el.id = 'letter-'+l.id;
  el.style.left = l.x+'px';
  el.style.top = l.y+'px';

  if(l.imgData){
    const img = document.createElement('img');
    img.src = l.imgData;
    img.draggable = false;
    el.appendChild(img);
    const ov = document.createElement('div');
    ov.className = 'letter-overlay';
    el.appendChild(ov);
  } else {
    const ph = document.createElement('div');
    ph.className = 'letter-no-img';
    ph.innerHTML = `<svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><polyline points="22,6 12,13 2,6"/></svg><span>letter</span>`;
    el.appendChild(ph);
  }

  // meta bar
  const meta = document.createElement('div');
  meta.className = 'letter-meta';
  const fromDiv = document.createElement('div');
  fromDiv.className = 'letter-from';
  fromDiv.innerHTML = `@${l.creator}<span>→ @${l.taggedUser}</span>`;
  meta.appendChild(fromDiv);
  if(l.reply){
    const rep = document.createElement('div');
    rep.className = 'letter-replied';
    rep.innerHTML = `<svg fill="none" stroke="#fff" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`;
    meta.appendChild(rep);
  }
  el.appendChild(meta);

  // events
  let clickOk = true;
  el.addEventListener('mousedown', e => { clickOk = true; startDrag(e,l,el); });
  el.addEventListener('touchstart', e => { clickOk = true; startDragTouch(e,l,el); }, {passive:false});
  el.addEventListener('click', () => { if(clickOk && !(dragState&&dragState.moved)) openLetter(l); });

  document.getElementById('canvas').appendChild(el);
}

// ══════════════════════════════════════════════════════
//  ANIMATION — slow random drift
// ══════════════════════════════════════════════════════
function startAnimation(){
  // assign velocity if missing
  letters.forEach(l => {
    if(!l.vx && !l.vy){
      const a = Math.random()*Math.PI*2;
      const sp = 0.12 + Math.random()*0.18;
      l.vx = Math.cos(a)*sp;
      l.vy = Math.sin(a)*sp;
    }
  });
  function tick(){
    const canvas = document.getElementById('canvas');
    const cw = canvas.clientWidth, ch = canvas.clientHeight;
    letters.forEach(l => {
      if(dragState && dragState.id === l.id) return;
      l.x += l.vx; l.y += l.vy;
      if(l.x < 0){ l.x=0; l.vx=Math.abs(l.vx); }
      if(l.x > cw-148){ l.x=cw-148; l.vx=-Math.abs(l.vx); }
      if(l.y < 0){ l.y=0; l.vy=Math.abs(l.vy); }
      if(l.y > ch-148){ l.y=ch-148; l.vy=-Math.abs(l.vy); }
      const el = document.getElementById('letter-'+l.id);
      if(el && !el.classList.contains('dragging')){
        el.style.left = l.x+'px';
        el.style.top = l.y+'px';
      }
    });
    animId = requestAnimationFrame(tick);
  }
  animId = requestAnimationFrame(tick);
}

// ══════════════════════════════════════════════════════
//  DRAG
// ══════════════════════════════════════════════════════
function startDrag(e,l,el){
  e.preventDefault();
  const ox = e.clientX - l.x, oy = e.clientY - l.y;
  dragState = {id:l.id, ox, oy, moved:false};
  el.classList.add('dragging');
  l.vx=0; l.vy=0;
  function mv(e){
    const nx=e.clientX-ox, ny=e.clientY-oy;
    if(Math.abs(nx-l.x)>4||Math.abs(ny-l.y)>4) dragState.moved=true;
    l.x=nx; l.y=ny;
    el.style.left=nx+'px'; el.style.top=ny+'px';
  }
  function up(){
    el.classList.remove('dragging');
    const a=Math.random()*Math.PI*2, sp=0.1+Math.random()*0.15;
    l.vx=Math.cos(a)*sp; l.vy=Math.sin(a)*sp;
    // persist positions
    DB.saveLetters(letters);
    setTimeout(()=>{ dragState=null; },60);
    document.removeEventListener('mousemove',mv);
    document.removeEventListener('mouseup',up);
  }
  document.addEventListener('mousemove',mv);
  document.addEventListener('mouseup',up);
}

function startDragTouch(e,l,el){
  e.preventDefault();
  const t=e.touches[0];
  const ox=t.clientX-l.x, oy=t.clientY-l.y;
  dragState={id:l.id, ox, oy, moved:false};
  el.classList.add('dragging');
  l.vx=0; l.vy=0;
  function mv(e){
    const tc=e.touches[0];
    const nx=tc.clientX-ox, ny=tc.clientY-oy;
    if(Math.abs(nx-l.x)>4||Math.abs(ny-l.y)>4) dragState.moved=true;
    l.x=nx; l.y=ny;
    el.style.left=nx+'px'; el.style.top=ny+'px';
  }
  function up(){
    el.classList.remove('dragging');
    const a=Math.random()*Math.PI*2, sp=0.1+Math.random()*0.15;
    l.vx=Math.cos(a)*sp; l.vy=Math.sin(a)*sp;
    DB.saveLetters(letters);
    setTimeout(()=>{ dragState=null; },60);
    document.removeEventListener('touchmove',mv);
    document.removeEventListener('touchend',up);
  }
  document.addEventListener('touchmove',mv,{passive:false});
  document.addEventListener('touchend',up);
}

// ══════════════════════════════════════════════════════
//  CREATE LETTER
// ══════════════════════════════════════════════════════
function openCreate(){
  document.getElementById('create-overlay').classList.add('open');
  document.getElementById('create-msg').value='';
  document.getElementById('tag-input').value='';
  document.getElementById('tag-hint').textContent='';
  document.getElementById('tag-hint').className='';
  document.getElementById('create-preview').style.display='none';
  document.getElementById('file-input').value='';
  selectedImgData=null;
  tagValid=false;
}
function closeCreate(){
  document.getElementById('create-overlay').classList.remove('open');
}
function handleCreateBg(e){ if(e.target===document.getElementById('create-overlay')) closeCreate(); }

function onFileChange(e){
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    selectedImgData=ev.target.result;
    const prev=document.getElementById('create-preview');
    prev.src=selectedImgData;
    prev.style.display='block';
  };
  r.readAsDataURL(f);
}

function onTagInput(){
  const val = document.getElementById('tag-input').value.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');
  document.getElementById('tag-input').value = val;
  const hint = document.getElementById('tag-hint');
  if(!val){ hint.textContent=''; hint.className=''; tagValid=false; return; }
  if(val === currentUser){ hint.textContent='Cannot tag yourself.'; hint.className='err'; tagValid=false; return; }
  const users=DB.getUsers();
  if(users[val]){ hint.textContent='✓ @'+val+' found'; hint.className='ok'; tagValid=true; }
  else { hint.textContent='No user "@'+val+'" found.'; hint.className='err'; tagValid=false; }
}

function dropLetter(){
  const msg = document.getElementById('create-msg').value.trim();
  const tag = document.getElementById('tag-input').value.trim().toLowerCase();
  if(!msg){ document.getElementById('create-msg').focus(); return; }
  if(!tag){ document.getElementById('tag-input').focus(); return; }
  if(!tagValid){ return; }

  const canvas = document.getElementById('canvas');
  const cw=canvas.clientWidth, ch=canvas.clientHeight;
  const pad=80;
  const x=pad+Math.random()*(cw-pad*2-148);
  const y=pad+Math.random()*(ch-pad*2-148);
  const a=Math.random()*Math.PI*2, sp=0.12+Math.random()*0.15;

  const l={
    id: Date.now()+'_'+Math.random().toString(36).slice(2),
    imgData: selectedImgData,
    message: msg,
    creator: currentUser,
    taggedUser: tag,
    reply: null,
    x, y,
    vx: Math.cos(a)*sp,
    vy: Math.sin(a)*sp,
    createdAt: Date.now(),
  };
  letters.push(l);
  DB.saveLetters(letters);

  // create notification for tagged user
  const notifs = DB.getNotifs(tag);
  notifs.unshift({ id:l.id, from:currentUser, preview:msg.slice(0,60), read:false, ts:Date.now() });
  DB.saveNotifs(tag, notifs);

  renderLetter(l);
  updateCount();
  closeCreate();
  document.getElementById('empty-hint').classList.add('gone');
}

// ══════════════════════════════════════════════════════
//  VIEW LETTER
// ══════════════════════════════════════════════════════
function openLetter(l){
  selectedLetter = l;

  // photo
  const wrap = document.getElementById('modal-photo-wrap');
  wrap.innerHTML='';
  if(l.imgData){
    const img=document.createElement('img');
    img.src=l.imgData;
    img.className='modal-photo';
    wrap.appendChild(img);
  } else {
    const ph=document.createElement('div');
    ph.className='modal-photo-placeholder';
    ph.innerHTML=`<svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><polyline points="22,6 12,13 2,6"/></svg><span>No photo attached</span>`;
    wrap.appendChild(ph);
  }

  document.getElementById('modal-from-name').textContent = '@'+l.creator;
  document.getElementById('modal-to-tag').textContent = '→ @'+l.taggedUser;
  document.getElementById('modal-msg').textContent = l.message;

  // reply section
  const replyContent = document.getElementById('modal-reply-content');
  const replyBox = document.getElementById('reply-input-box');
  const isTagged = currentUser === l.taggedUser;

  if(l.reply){
    replyContent.innerHTML = `<div class="msg-text reply">${escHtml(l.reply)}</div>`;
    replyBox.style.display='none';
  } else if(isTagged){
    replyContent.innerHTML = `<div class="msg-empty">You haven't replied yet.</div>`;
    replyBox.style.display='';
    document.getElementById('reply-textarea').value='';
    // mark notif as read
    markNotifRead(l.id);
  } else {
    replyContent.innerHTML = `<div class="msg-empty">No reply yet.</div>`;
    replyBox.style.display='none';
  }

  // delete btn (only owner)
  document.getElementById('modal-del-btn').style.display = currentUser===l.creator ? '' : 'none';

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
  selectedLetter=null;
}
function handleModalBg(e){ if(e.target===document.getElementById('modal-overlay')) closeModal(); }

function submitReply(){
  const txt = document.getElementById('reply-textarea').value.trim();
  if(!txt || !selectedLetter) return;
  selectedLetter.reply = txt;
  DB.saveLetters(letters);

  // re-render the card (add green dot)
  const el = document.getElementById('letter-'+selectedLetter.id);
  if(el){
    const meta = el.querySelector('.letter-meta');
    if(meta && !el.querySelector('.letter-replied')){
      const rep=document.createElement('div');
      rep.className='letter-replied';
      rep.innerHTML=`<svg fill="none" stroke="#fff" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`;
      meta.appendChild(rep);
    }
  }

  // notify creator
  const notifs = DB.getNotifs(selectedLetter.creator);
  notifs.unshift({ id:selectedLetter.id, from:currentUser, preview:'Replied: '+txt.slice(0,50), read:false, ts:Date.now(), isReply:true });
  DB.saveNotifs(selectedLetter.creator, notifs);

  closeModal();
}

// ══════════════════════════════════════════════════════
//  DELETE
// ══════════════════════════════════════════════════════
function confirmDelete(){
  document.getElementById('del-overlay').classList.add('open');
}
function doDelete(){
  if(!selectedLetter) return;
  const id=selectedLetter.id;
  letters = letters.filter(l=>l.id!==id);
  DB.saveLetters(letters);
  const el = document.getElementById('letter-'+id);
  if(el) el.remove();
  document.getElementById('del-overlay').classList.remove('open');
  closeModal();
  updateCount();
  if(letters.length===0) document.getElementById('empty-hint').classList.remove('gone');
}

// ══════════════════════════════════════════════════════
//  NOTIFICATIONS
// ══════════════════════════════════════════════════════
function toggleNotif(){
  const panel = document.getElementById('notif-panel');
  const isOpen = panel.classList.contains('open');
  if(isOpen){ closeNotif(); return; }
  renderNotifs();
  panel.classList.add('open');
}
function closeNotif(){
  document.getElementById('notif-panel').classList.remove('open');
}

function renderNotifs(){
  const notifs = DB.getNotifs(currentUser);
  const list = document.getElementById('notif-list');
  list.innerHTML='';
  if(!notifs.length){
    list.innerHTML=`<div class="notif-empty"><svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>No notifications yet.</div>`;
    return;
  }
  notifs.forEach(n => {
    const div=document.createElement('div');
    div.className='notif-item'+(n.read?'':' unread');
    const ago = timeAgo(n.ts);
    div.innerHTML=`
      <div class="notif-title">${n.read?'':'<span class="notif-dot"></span>'}${n.isReply ? '@'+n.from+' replied' : '@'+n.from+' tagged you'}</div>
      <div class="notif-preview">${escHtml(n.preview)}</div>
      <div class="notif-time">${ago}</div>
    `;
    div.onclick=()=>{
      const l = letters.find(x=>x.id===n.id);
      if(l){ closeNotif(); openLetter(l); }
    };
    list.appendChild(div);
  });
}

function markNotifRead(letterId){
  const notifs = DB.getNotifs(currentUser);
  notifs.forEach(n=>{ if(n.id===letterId) n.read=true; });
  DB.saveNotifs(currentUser, notifs);
  updateNotifBadge();
}

function updateNotifBadge(){
  const notifs = DB.getNotifs(currentUser);
  const unread = notifs.filter(n=>!n.read).length;
  const badge = document.getElementById('notif-badge');
  badge.textContent = unread > 9 ? '9+' : unread;
  badge.classList.toggle('show', unread > 0);
}

// ══════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════
function updateCount(){
  const c=letters.length;
  document.getElementById('tb-count').textContent = c+' letter'+(c!==1?'s':'');
}

function toggleTheme(){
  isDark=!isDark;
  document.body.classList.toggle('dark',isDark);
  DB.saveTheme(isDark?'dark':'light');
  updateThemeIcon();
}
function updateThemeIcon(){
  const icon = document.getElementById('theme-icon');
  if(!icon) return;
  if(isDark){
    icon.innerHTML='<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
  } else {
    icon.innerHTML='<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
  }
}

function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function timeAgo(ts){
  const d=(Date.now()-ts)/1000;
  if(d<60) return 'just now';
  if(d<3600) return Math.floor(d/60)+'m ago';
  if(d<86400) return Math.floor(d/3600)+'h ago';
  return Math.floor(d/86400)+'d ago';
}

// keyboard
document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){
    closeModal();
    closeCreate();
    closeNotif();
    document.getElementById('del-overlay').classList.remove('open');
  }
});
document.getElementById('li-pass').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
document.getElementById('re-pass2').addEventListener('keydown',e=>{ if(e.key==='Enter') doRegister(); });
</script>
